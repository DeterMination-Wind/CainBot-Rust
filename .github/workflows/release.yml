name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run syntax check
        run: npm run check

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: CainBot ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            src/**/*
            prompts/**/*
            scripts/**/*
            package.json
            config.example.json
            run-cain-bot.bat
            run-cain-bot.sh
            run-cain-service.bat
            .gitignore
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
