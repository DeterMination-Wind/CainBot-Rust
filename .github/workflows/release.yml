name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows-portable:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm install

      - name: Run Node syntax check
        run: npm run check

      - name: Run Rust check
        run: cargo check --locked

      - name: Build Windows portable package
        id: build
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}"
          if ("${{ github.ref }}" -eq "refs/heads/main") {
            $version = "pre-main"
          } elseif ([string]::IsNullOrWhiteSpace($version)) {
            $version = (Get-Content -Raw package.json | ConvertFrom-Json).version
          }
          .\scripts\build-windows-portable.ps1 -Version $version

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: cainbot-windows-portable
          path: |
            dist/*.zip
            dist/*.sha256

      - name: Move pre-main tag to current commit
        if: github.ref == 'refs/heads/main'
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f pre-main $env:GITHUB_SHA
          git push origin refs/tags/pre-main --force

      - name: Create or update prerelease
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pre-main
          name: CainBot pre-main
          prerelease: true
          make_latest: false
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update stable release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: CainBot ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
